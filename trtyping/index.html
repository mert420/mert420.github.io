<!DOCTYPE html>
<html lang="tr" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>typing</title>
    <link rel="stylesheet" href="style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <div class="wrapper">
      <input type="text" class="input-field" />
      <div class="content-box">
        <div class="typing-text">
          <p></p>
        </div>
        <div class="content">
          <ul class="result-details">
            <li class="time">
              <p>Kalan zaman:</p>
              <span style="color: #cb3439"><b>60</b>s</span>
            </li>
            <li class="mistake">
              <p>Hatalı harfler:</p>
              <span style="color:#cb3439">0</span>
            </li>
            <li class="wpm">
              <p>Saniye başına yazı:</p>
              <span style="color: #cb3439">0</span>
            </li>
            <li class="cpm">
              <p>Dakika başına vuruş:</p>
              <span style="color: #cb3439">0</span>
            </li>
          </ul>
          <button>Sıfırla</button>
        </div>
      </div>
    </div>

    <script src="js/paragraphs.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
